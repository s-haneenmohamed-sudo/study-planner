<!DOCTYPE html>
<html>
<head>
    <title>Study Planner</title>
    <style>
        body { font-family: Arial; text-align:center; background:#f4f4f4; }
        .box { margin-top:50px; background:white; display:inline-block; padding:20px; border-radius:10px; }
        input { padding:10px; width:200px; }
        button { padding:10px; background:green; color:white; border:none; }
        li { list-style:none; margin:10px; padding:10px; background:#eee; display:flex; justify-content:space-between; }
        a { color:red; text-decoration:none; }
    </style>
</head>
<body>

<div class="box">
<h1>Study Planner</h1>

<form method="POST" action="/add">
<input name="task" placeholder="Enter task">
<button>Add</button>
</form>

<ul>
{% for task in tasks %}
<li>{{ task }} <a href="/delete/{{ loop.index0 }}">X</a></li>
{% endfor %}
</ul>

</div>

</body>
</html>
